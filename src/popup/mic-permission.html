<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echo-Todo Microphone Access</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(251, 113, 133, 0.16), transparent 38%),
          linear-gradient(180deg, #fff8f1 0%, #fffdf8 100%);
        color: #3f2d2d;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 440px);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(251, 146, 60, 0.18);
        border-radius: 24px;
        box-shadow: 0 18px 40px rgba(148, 76, 30, 0.12);
        padding: 28px 24px;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #c2410c;
        margin-bottom: 10px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #6b4f4f;
      }

      .panel {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        background: #fff4e8;
        font-size: 14px;
      }

      .origin {
        margin-top: 8px;
        font-family: "Consolas", monospace;
        font-size: 12px;
        word-break: break-all;
        color: #9a3412;
      }

      .actions {
        margin-top: 22px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      #request-btn {
        color: white;
        background: linear-gradient(135deg, #fb7185 0%, #f59e0b 100%);
      }

      #close-btn {
        color: #7c2d12;
        background: #ffedd5;
      }

      #status {
        margin-top: 18px;
        min-height: 24px;
        font-size: 14px;
        line-height: 1.6;
      }

      #status.success {
        color: #166534;
      }

      #status.error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">Echo-Todo</div>
      <h1>マイク許可ページ</h1>
      <p>
        ここでマイクを一度許可すると、拡張機能ポップアップからも音声入力を再試行しやすくなります。
      </p>

      <div class="panel">
        許可対象の origin
        <div class="origin" id="origin"></div>
      </div>

      <div class="actions">
        <button id="request-btn" type="button">マイクを許可する</button>
        <button id="close-btn" type="button">閉じる</button>
      </div>

      <div id="status"></div>
    </main>

    <script type="module" src="./mic-permission.ts"></script>
  </body>
</html>
