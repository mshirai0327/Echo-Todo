<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echo-Todo</title>
    <link rel="stylesheet" href="../styles/popup.css" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-task-list" viewBox="0 0 24 24">
        <path
          d="M4 5.5A1.5 1.5 0 0 1 5.5 4h13A1.5 1.5 0 0 1 20 5.5v13a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18.5v-13ZM7 8.5h10v-1.5H7v1.5Zm0 4h10V11H7v1.5Zm0 4h7V15H7v1.5Z"
        />
      </symbol>
      <symbol id="icon-bar-chart" viewBox="0 0 24 24">
        <path d="M5 9.5h3V19H5V9.5Zm5.5-4h3V19h-3V5.5ZM16 12h3v7h-3v-7Z" />
      </symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24">
        <path
          d="m19.4 13.5.1-1.5-.1-1.5 1.8-1.4a.7.7 0 0 0 .2-.9l-1.7-2.9a.7.7 0 0 0-.9-.3l-2.1.8a7.9 7.9 0 0 0-2.5-1.4l-.3-2.2A.8.8 0 0 0 13 2h-2a.8.8 0 0 0-.8.7l-.3 2.2A7.9 7.9 0 0 0 7.4 6.3l-2.1-.8a.7.7 0 0 0-.9.3L2.7 8.7a.7.7 0 0 0 .2.9l1.8 1.4-.1 1.5.1 1.5-1.8 1.4a.7.7 0 0 0-.2.9l1.7 2.9a.7.7 0 0 0 .9.3l2.1-.8c.8.6 1.6 1 2.5 1.4l.3 2.2a.8.8 0 0 0 .8.7h2a.8.8 0 0 0 .8-.7l.3-2.2c.9-.3 1.7-.8 2.5-1.4l2.1.8a.7.7 0 0 0 .9-.3l1.7-2.9a.7.7 0 0 0-.2-.9l-1.8-1.4ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"
        />
      </symbol>
      <symbol id="icon-add" viewBox="0 0 24 24">
        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2Z" />
      </symbol>
      <symbol id="icon-mic" viewBox="0 0 24 24">
        <path
          d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3Zm5.3-3a5.3 5.3 0 0 1-10.6 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-1.7Z"
        />
      </symbol>
      <symbol id="icon-stop" viewBox="0 0 24 24">
        <path d="M6 6h12v12H6z" />
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m9 16.2-4.2-4.2-1.4 1.4L9 19 21 7l-1.4-1.4z" />
      </symbol>
      <symbol id="icon-drag-indicator" viewBox="0 0 24 24">
        <path
          d="M9 6a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm6 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM9 10a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm6 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM9 14a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm6 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"
        />
      </symbol>
      <symbol id="icon-hourglass" viewBox="0 0 24 24">
        <path
          d="M6 2v6h.1L10 12l-3.9 4H6v6h12v-6h-.1L14 12l3.9-4h.1V2H6Zm10 14.5V20H8v-3.5l4-4 4 4ZM12 10.6 8 6.6V4h8v2.6l-4 4Z"
        />
      </symbol>
      <symbol id="icon-schedule" viewBox="0 0 24 24">
        <path
          d="M11 7h2v6l5 3-1 1.7-6-3.7V7Zm1 15a10 10 0 1 1 0-20 10 10 0 0 1 0 20Zm0-2a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"
        />
      </symbol>
      <symbol id="icon-task-done" viewBox="0 0 24 24">
        <path
          d="m10.6 16.6-4.2-4.2-1.4 1.4 5.6 5.6L21 9l-1.4-1.4-9 9ZM19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8v-2H5V5h14v5h2V5a2 2 0 0 0-2-2Z"
        />
      </symbol>
      <symbol id="icon-save" viewBox="0 0 24 24">
        <path
          d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4Zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm3-10H5V5h10v4Z"
        />
      </symbol>
    </svg>

    <div id="app">
      <header class="header">
        <div class="header-brand">
          <div class="header-mark">
            <svg class="icon header-mark-icon" viewBox="0 0 24 24" aria-hidden="true">
              <use href="#icon-task-list"></use>
            </svg>
          </div>
          <div class="header-copy">
            <div class="header-title">Echo-Todo</div>
            <p class="header-subtitle">思いついたら、すぐ積む。</p>
          </div>
        </div>
      </header>

      <nav class="tabs" aria-label="画面切り替え">
        <button class="tab-btn active" data-tab="main" type="button">
          <svg class="icon tab-icon" viewBox="0 0 24 24" aria-hidden="true">
            <use href="#icon-task-list"></use>
          </svg>
          <span class="tab-label">タスク</span>
        </button>
        <button class="tab-btn" data-tab="stats" type="button">
          <svg class="icon tab-icon" viewBox="0 0 24 24" aria-hidden="true">
            <use href="#icon-bar-chart"></use>
          </svg>
          <span class="tab-label">統計</span>
        </button>
        <button class="tab-btn" data-tab="settings" type="button">
          <svg class="icon tab-icon" viewBox="0 0 24 24" aria-hidden="true">
            <use href="#icon-settings"></use>
          </svg>
          <span class="tab-label">設定</span>
        </button>
      </nav>

      <section id="tab-main" class="tab-content active">
        <div class="task-toolbar">
          <div class="section-title">現在のタスク</div>
          <div class="section-hint">
            <svg class="icon hint-icon" viewBox="0 0 24 24" aria-hidden="true">
              <use href="#icon-drag-indicator"></use>
            </svg>
            <span>ドラッグで並び替え</span>
          </div>
        </div>

        <div class="task-list-container" id="task-list">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon" aria-hidden="true">🌸</div>
            <p class="empty-title">タスクはまだありません</p>
            <p class="empty-copy">テキスト入力または音声で追加できます</p>
          </div>
        </div>

        <div class="input-area">
          <div class="input-row">
            <textarea
              id="task-input"
              class="task-input"
              placeholder="タスクを入力、または音声で追加"
              rows="1"
            ></textarea>
            <button class="add-btn" id="add-btn" type="button" title="追加" aria-label="追加">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <use href="#icon-add"></use>
              </svg>
            </button>
            <button
              class="mic-button"
              id="mic-btn"
              type="button"
              title="音声入力"
              aria-label="音声入力"
            >
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <use href="#icon-mic"></use>
              </svg>
            </button>
          </div>
          <div class="voice-status" id="voice-status"></div>
        </div>
      </section>

      <section id="tab-stats" class="tab-content">
        <div class="stats-container">
          <div class="stats-title">タスクの記録</div>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon-shell">
                <svg class="icon stat-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <use href="#icon-add"></use>
                </svg>
              </div>
              <div class="stat-value" id="stat-created">0</div>
              <div class="stat-label">作成した数</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon-shell">
                <svg class="icon stat-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <use href="#icon-task-done"></use>
                </svg>
              </div>
              <div class="stat-value" id="stat-closed">0</div>
              <div class="stat-label">完了した数</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon-shell">
                <svg class="icon stat-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <use href="#icon-hourglass"></use>
                </svg>
              </div>
              <div class="stat-value" id="stat-expired">0</div>
              <div class="stat-label">期限切れ数</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon-shell">
                <svg class="icon stat-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <use href="#icon-schedule"></use>
                </svg>
              </div>
              <div class="stat-value" id="stat-avg-time">--</div>
              <div class="stat-label">平均クローズ時間</div>
            </div>
          </div>
        </div>
      </section>

      <section id="tab-settings" class="tab-content">
        <div class="settings-container">
          <div class="settings-section">
            <div class="settings-section-title">タスク設定</div>
            <div class="form-group">
              <label class="form-label" for="ttl-input">
                <span class="label-with-icon">
                  <svg class="icon label-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <use href="#icon-schedule"></use>
                  </svg>
                  <span>タスクの有効期限（時間）</span>
                </span>
              </label>
              <input
                type="number"
                id="ttl-input"
                class="form-input"
                min="1"
                max="720"
                value="72"
              />
              <div class="form-hint">新しく作るタスクに適用されます（デフォルト: 72時間）</div>
            </div>
          </div>

          <button class="save-btn" id="save-settings-btn" type="button">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <use href="#icon-save"></use>
            </svg>
            <span>設定を保存</span>
          </button>
        </div>
      </section>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
