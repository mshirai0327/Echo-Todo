name: Build Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: echo-todo-extension
          path: dist
          retention-days: 30

      - name: Create release ZIP
        if: github.event_name == 'release'
        run: |
          cd dist
          zip -r ../echo-todo-extension.zip .

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: echo-todo-extension.zip
